<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据统计 - 健康管家</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 100px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            position: sticky;
            top: 0;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            z-index: 50;
        }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: none; color: white; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .period-tabs {
            display: flex;
            gap: 8px;
            padding: 16px;
            justify-content: center;
        }
        .period-tab {
            padding: 10px 24px;
            border-radius: 24px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .period-tab.active {
            background: linear-gradient(135deg, #667eea, #f093fb);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 16px;
        }
        .summary-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px 16px;
            text-align: center;
            color: #333;
            transition: transform 0.3s ease;
        }
        .summary-card:active { transform: scale(0.98); }
        .summary-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .summary-number {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .summary-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .chart-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 24px;
            margin: 0 16px 16px;
            color: #333;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container {
            position: relative;
            height: 220px;
            margin-bottom: 16px;
        }
        .chart-canvas {
            width: 100%;
            height: 100%;
        }
        .task-breakdown {
            margin-top: 16px;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .task-item:last-child { border-bottom: none; }
        .task-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .task-info { flex: 1; }
        .task-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .task-count {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .task-bar-container {
            width: 80px;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin-right: 12px;
        }
        .task-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .task-percent {
            font-size: 14px;
            font-weight: 700;
            color: #667eea;
            min-width: 40px;
            text-align: right;
        }
        .insight-card {
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(240,147,251,0.1));
            border-radius: 20px;
            padding: 20px;
            margin: 0 16px 16px;
            border: 1px solid rgba(102,126,234,0.2);
        }
        .insight-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .insight-text {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.85);
        }
        .insight-highlight {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .empty-text { font-size: 16px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="icon-btn" onclick="history.back()">←</button>
        <h1>数据统计</h1>
        <div style="width: 40px;"></div>
    </div>

    <div class="period-tabs">
        <button class="period-tab active" data-period="week">本周</button>
        <button class="period-tab" data-period="month">本月</button>
        <button class="period-tab" data-period="year">本年</button>
    </div>

    <div id="stats-content">
        <div class="summary-cards" id="summary-cards">
            <div class="summary-card">
                <div class="summary-icon">✅</div>
                <div class="summary-number" id="total-completions">0</div>
                <div class="summary-label">总完成次数</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">🔥</div>
                <div class="summary-number" id="active-days">0</div>
                <div class="summary-label">活跃天数</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">📈</div>
                <div class="summary-number" id="completion-rate">0%</div>
                <div class="summary-label">完成率</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">🏆</div>
                <div class="summary-number" id="best-streak">0</div>
                <div class="summary-label">最长连续</div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title">📊 完成趋势</div>
            <div class="chart-container">
                <canvas class="chart-canvas" id="trend-chart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title">📋 任务分布</div>
            <div class="chart-container">
                <canvas class="chart-canvas" id="distribution-chart"></canvas>
            </div>
            <div class="task-breakdown" id="task-breakdown"></div>
        </div>

        <div class="insight-card">
            <div class="insight-title">💡 健康洞察</div>
            <div class="insight-text" id="insight-text">
                继续加油，养成健康好习惯！
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'healthReminder_v3';
        let currentPeriod = 'week';

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : { tasks: [], records: [] };
        }

        function getDateRange(period) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let startDate, endDate = today;
            let labels = [];

            if (period === 'week') {
                const dayOfWeek = today.getDay();
                const monday = new Date(today);
                monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
                startDate = monday;
                const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    labels.push({ label: days[i], date: d.toISOString().split('T')[0] });
                }
            } else if (period === 'month') {
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
                const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
                for (let i = 1; i <= daysInMonth; i++) {
                    const d = new Date(today.getFullYear(), today.getMonth(), i);
                    labels.push({ label: i + '日', date: d.toISOString().split('T')[0] });
                }
            } else if (period === 'year') {
                startDate = new Date(today.getFullYear(), 0, 1);
                const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                for (let i = 0; i < 12; i++) {
                    labels.push({ label: months[i], date: null, month: i });
                }
            }

            return { startDate, endDate, labels };
        }

        function getTaskCompletions(period) {
            const state = loadState();
            const records = state.records || [];
            const tasks = state.tasks || [];
            const { startDate, endDate, labels } = getDateRange(period);

            let totalCompletions = 0;
            let activeDays = 0;
            let bestStreak = 0;
            let currentStreak = 0;
            let taskStats = {};
            let dailyData = [];

            tasks.forEach(t => {
                taskStats[t.id] = { name: t.name, icon: t.icon || '✨', count: 0, color: t.color || '#667eea' };
            });

            labels.forEach(({ label, date, month }) => {
                let dayCompletions = 0;
                let dayTotal = tasks.length;

                if (period === 'year') {
                    records.forEach(r => {
                        const rDate = new Date(r.date);
                        if (rDate.getMonth() === month && rDate.getFullYear() === startDate.getFullYear()) {
                            tasks.forEach(t => {
                                if (r[t.id]) {
                                    dayCompletions++;
                                    taskStats[t.id].count++;
                                }
                            });
                        }
                    });
                } else {
                    const record = records.find(r => r.date === date);
                    if (record) {
                        tasks.forEach(t => {
                            if (record[t.id]) {
                                dayCompletions++;
                                taskStats[t.id].count++;
                            }
                        });
                    }
                }

                dailyData.push({ label, completions: dayCompletions, total: dayTotal });
                totalCompletions += dayCompletions;
                if (dayCompletions > 0) activeDays++;
            });

            // Calculate streak
            const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            for (let i = 0; i < sortedRecords.length; i++) {
                const r = sortedRecords[i];
                const allDone = tasks.length > 0 && tasks.every(t => r[t.id]);
                if (allDone) {
                    currentStreak++;
                    bestStreak = Math.max(bestStreak, currentStreak);
                } else {
                    currentStreak = 0;
                }
            }

            const totalPossible = labels.length * tasks.length;
            const completionRate = totalPossible > 0 ? Math.round((totalCompletions / totalPossible) * 100) : 0;

            return {
                totalCompletions,
                activeDays,
                completionRate,
                bestStreak,
                taskStats,
                dailyData,
                tasks
            };
        }

        function drawTrendChart(data) {
            const canvas = document.getElementById('trend-chart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const width = rect.width;
            const height = rect.height;
            const padding = { top: 20, right: 20, bottom: 40, left: 40 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            const maxVal = Math.max(...data.map(d => d.completions), 1);
            const barWidth = chartWidth / data.length * 0.6;
            const barGap = chartWidth / data.length * 0.4;

            // Decide label skip interval based on data count
            let labelSkip = 1;
            if (data.length > 15) labelSkip = 3;
            else if (data.length > 10) labelSkip = 2;

            // Draw grid lines
            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (chartHeight / 4) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            // Draw bars
            data.forEach((d, i) => {
                const x = padding.left + (chartWidth / data.length) * i + barGap / 2;
                const barHeight = (d.completions / maxVal) * chartHeight;
                const y = padding.top + chartHeight - barHeight;

                const gradient = ctx.createLinearGradient(0, y, 0, y + barHeight);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#f093fb');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, barHeight, 6);
                ctx.fill();

                // Value label
                if (d.completions > 0) {
                    ctx.fillStyle = '#667eea';
                    ctx.font = 'bold 12px "Noto Sans SC"';
                    ctx.textAlign = 'center';
                    ctx.fillText(d.completions, x + barWidth / 2, y - 6);
                }

                // X axis label (skip some to avoid crowding)
                if (i % labelSkip === 0 || i === data.length - 1) {
                    ctx.fillStyle = '#888';
                    ctx.font = '11px "Noto Sans SC"';
                    ctx.textAlign = 'center';
                    ctx.fillText(d.label, x + barWidth / 2, height - 12);
                }
            });
        }

        function drawDistributionChart(taskStats, total) {
            const canvas = document.getElementById('distribution-chart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const width = rect.width;
            const height = rect.height;

            ctx.clearRect(0, 0, width, height);

            const entries = Object.values(taskStats).filter(t => t.count > 0);
            if (entries.length === 0) {
                ctx.fillStyle = '#ccc';
                ctx.font = '14px "Noto Sans SC"';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', width / 2, height / 2);
                return;
            }

            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(centerX, centerY) - 30;
            const innerRadius = radius * 0.5;

            let startAngle = -Math.PI / 2;
            const colors = ['#667eea', '#f093fb', '#4ECDC4', '#FF6B6B', '#FFE66D', '#A78BFA', '#81C784', '#FF8E53'];

            entries.forEach((entry, i) => {
                const sliceAngle = (entry.count / total) * Math.PI * 2;
                const endAngle = startAngle + sliceAngle;
                const color = colors[i % colors.length];

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.arc(centerX, centerY, innerRadius, endAngle, startAngle, true);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();

                // Label
                const midAngle = startAngle + sliceAngle / 2;
                const labelRadius = radius * 0.75;
                const labelX = centerX + Math.cos(midAngle) * labelRadius;
                const labelY = centerY + Math.sin(midAngle) * labelRadius;

                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px "Noto Sans SC"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const percent = Math.round((entry.count / total) * 100);
                if (percent >= 5) {
                    ctx.fillText(percent + '%', labelX, labelY);
                }

                startAngle = endAngle;
            });

            // Center text
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px "Noto Sans SC"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('任务分布', centerX, centerY);
        }

        function renderTaskBreakdown(taskStats, total) {
            const container = document.getElementById('task-breakdown');
            const entries = Object.values(taskStats).sort((a, b) => b.count - a.count);
            const maxCount = Math.max(...entries.map(e => e.count), 1);
            const colors = ['#667eea', '#f093fb', '#4ECDC4', '#FF6B6B', '#FFE66D', '#A78BFA', '#81C784', '#FF8E53'];

            container.innerHTML = entries.map((entry, i) => {
                const percent = total > 0 ? Math.round((entry.count / total) * 100) : 0;
                const color = colors[i % colors.length];
                return `
                    <div class="task-item">
                        <div class="task-icon" style="background: ${color}20;">${entry.icon}</div>
                        <div class="task-info">
                            <div class="task-name">${entry.name}</div>
                            <div class="task-count">完成 ${entry.count} 次</div>
                        </div>
                        <div class="task-bar-container">
                            <div class="task-bar" style="width: ${(entry.count / maxCount) * 100}%; background: ${color};"></div>
                        </div>
                        <div class="task-percent">${percent}%</div>
                    </div>
                `;
            }).join('');
        }

        function generateInsight(data) {
            const insights = [];
            if (data.completionRate >= 80) {
                insights.push('太棒了！你的完成率高达 <span class="insight-highlight">' + data.completionRate + '%</span>，保持这个节奏！');
            } else if (data.completionRate >= 50) {
                insights.push('做得不错！完成率达到 <span class="insight-highlight">' + data.completionRate + '%</span>，再努力一点就能更好！');
            } else if (data.completionRate > 0) {
                insights.push('加油！目前完成率是 <span class="insight-highlight">' + data.completionRate + '%</span>，每天坚持一点点，健康就会靠近你！');
            }

            if (data.bestStreak >= 7) {
                insights.push('连续坚持 <span class="insight-highlight">' + data.bestStreak + '天</span>，你已经是习惯养成大师了！');
            } else if (data.bestStreak >= 3) {
                insights.push('连续 <span class="insight-highlight">' + data.bestStreak + '天</span> 打卡，好习惯正在形成中！');
            }

            if (data.activeDays > 0) {
                const mostActive = Object.values(data.taskStats).sort((a, b) => b.count - a.count)[0];
                if (mostActive) {
                    insights.push('你最喜欢做的是 <span class="insight-highlight">' + mostActive.name + '</span>，共完成了 ' + mostActive.count + ' 次！');
                }
            }

            if (insights.length === 0) {
                insights.push('开始你的健康之旅吧！每天完成小目标，积累大改变！');
            }

            document.getElementById('insight-text').innerHTML = insights.join('<br><br>');
        }

        function renderStats() {
            const data = getTaskCompletions(currentPeriod);

            document.getElementById('total-completions').textContent = data.totalCompletions;
            document.getElementById('active-days').textContent = data.activeDays;
            document.getElementById('completion-rate').textContent = data.completionRate + '%';
            document.getElementById('best-streak').textContent = data.bestStreak;

            drawTrendChart(data.dailyData);
            drawDistributionChart(data.taskStats, data.totalCompletions);
            renderTaskBreakdown(data.taskStats, data.totalCompletions);
            generateInsight(data);
        }

        // Tab switching
        document.querySelectorAll('.period-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPeriod = tab.dataset.period;
                renderStats();
            });
        });

        // Initial render
        renderStats();

        // Redraw on resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(renderStats, 200);
        });
    </script>
</body>
</html>
