<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人资料 - 健康管家</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 100px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            position: sticky;
            top: 0;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            z-index: 50;
        }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: none; color: white; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .profile-header {
            text-align: center;
            padding: 40px 20px;
        }
        .avatar-container {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 20px;
        }
        .avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #f093fb);
            display: flex; align-items: center; justify-content: center;
            font-size: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .avatar:hover { transform: scale(1.05); }
        .avatar-edit {
            position: absolute;
            bottom: 0; right: 0;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #f093fb);
            border: 3px solid #1a1a2e;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }
        .nickname {
            font-size: 24px; font-weight: 700;
            margin-bottom: 8px;
        }
        .level-badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 20px;
            font-size: 14px; font-weight: 600;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 24px;
            margin: 0 16px 16px;
            color: #333;
        }
        .card h3 {
            font-size: 18px; font-weight: 700;
            margin-bottom: 16px;
            color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px; font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .avatar-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 12px;
            padding: 4px;
        }
        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
        }
        .avatar-option:hover { transform: scale(1.1); }
        .avatar-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(240,147,251,0.1));
        }
        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 16px;
            border: 2px dashed #667eea;
            background: rgba(102,126,234,0.05);
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: inherit;
        }
        .upload-btn:hover {
            background: rgba(102,126,234,0.1);
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px; font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #f093fb);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .stats-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .stat-item {
            text-align: center;
            padding: 16px 8px;
            background: #f8f9fa;
            border-radius: 16px;
        }
        .stat-number {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 12px; color: #888;
            margin-top: 4px;
        }
        /* 移动端适配 */
        @media (max-width: 480px) {
            .avatar-selector {
                grid-template-columns: repeat(6, 1fr);
                gap: 6px;
            }
            .avatar-option {
                font-size: 20px;
            }
        }
        @media (max-width: 360px) {
            .avatar-selector {
                grid-template-columns: repeat(6, 1fr);
                gap: 4px;
            }
            .avatar-option {
                font-size: 18px;
                border-width: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="icon-btn" onclick="history.back()">←</button>
        <h1>个人资料</h1>
        <div style="width: 40px;"></div>
    </div>

    <div class="profile-header">
        <div class="avatar-container">
            <div class="avatar" id="current-avatar">🧘</div>
            <div class="avatar-edit">📷</div>
        </div>
        <div class="nickname" id="display-nickname">健康达人</div>
        <div class="level-badge" id="display-level">Lv.1 健康新手</div>
    </div>

    <div class="card">
        <h3>✏️ 编辑资料</h3>
        <div class="form-group">
            <label class="form-label">昵称</label>
            <input type="text" class="form-input" id="nickname-input" placeholder="输入你的昵称" maxlength="20">
        </div>
        <div class="form-group">
            <label class="form-label">个性签名</label>
            <input type="text" class="form-input" id="bio-input" placeholder="输入个性签名" maxlength="50">
        </div>
        <button class="btn btn-primary" id="save-profile">保存资料</button>
    </div>

    <div class="card">
        <h3>🎨 选择头像</h3>
        <div class="avatar-selector" id="avatar-selector">
            <div class="avatar-option selected" data-avatar="🧘">🧘</div>
            <div class="avatar-option" data-avatar="😊">😊</div>
            <div class="avatar-option" data-avatar="😎">😎</div>
            <div class="avatar-option" data-avatar="🤗">🤗</div>
            <div class="avatar-option" data-avatar="🥰">🥰</div>
            <div class="avatar-option" data-avatar="😄">😄</div>
            <div class="avatar-option" data-avatar="🦁">🦁</div>
            <div class="avatar-option" data-avatar="🐯">🐯</div>
            <div class="avatar-option" data-avatar="🐼">🐼</div>
            <div class="avatar-option" data-avatar="🐨">🐨</div>
            <div class="avatar-option" data-avatar="🐸">🐸</div>
            <div class="avatar-option" data-avatar="🐙">🐙</div>
            <div class="avatar-option" data-avatar="🦊">🦊</div>
            <div class="avatar-option" data-avatar="🐰">🐰</div>
            <div class="avatar-option" data-avatar="🐱">🐱</div>
            <div class="avatar-option" data-avatar="🐶">🐶</div>
            <div class="avatar-option" data-avatar="🦄">🦄</div>
            <div class="avatar-option" data-avatar="🐲">🐲</div>
        </div>
        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
        <button class="upload-btn" id="upload-trigger">
            <span>📷</span>
            <span>上传自定义头像</span>
        </button>
    </div>

    <div class="card">
        <h3>📊 数据概览</h3>
        <div class="stats-preview">
            <div class="stat-item">
                <div class="stat-number" id="stat-streak">0</div>
                <div class="stat-label">连续打卡</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">累计完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="stat-badges">0</div>
                <div class="stat-label">获得奖章</div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'healthReminder_v3';
        let selectedAvatar = '🧘';

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        }

        function saveProfile() {
            const state = loadState();
            state.profile = {
                nickname: document.getElementById('nickname-input').value || '健康达人',
                bio: document.getElementById('bio-input').value || '',
                avatar: selectedAvatar,
                avatarType: selectedAvatar.startsWith('data:') ? 'image' : 'emoji'
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            updateDisplay();
            alert('资料保存成功！');
        }

        function updateDisplay() {
            const state = loadState();
            const profile = state.profile || {};

            document.getElementById('display-nickname').textContent = profile.nickname || '健康达人';
            const avatarEl = document.getElementById('current-avatar');
            if (profile.avatarType === 'image' && profile.avatar) {
                avatarEl.innerHTML = '<img src="' + profile.avatar + '" class="avatar-img" alt="头像">';
            } else {
                avatarEl.textContent = profile.avatar || '🧘';
                avatarEl.innerHTML = avatarEl.textContent;
            }
            document.getElementById('nickname-input').value = profile.nickname || '';
            document.getElementById('bio-input').value = profile.bio || '';
            
            // 计算等级
            const records = state.records || [];
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const record = records.find(r => r.date === dateStr);
                const tasks = state.tasks || [];
                if (record && tasks.every(t => record[t.id])) {
                    streak++;
                } else if (i > 0) break;
            }
            
            let level = 'Lv.1 健康新手';
            if (streak >= 365) level = 'Lv.6 传奇人物';
            else if (streak >= 100) level = 'Lv.5 健康大师';
            else if (streak >= 30) level = 'Lv.4 月度达人';
            else if (streak >= 14) level = 'Lv.3 坚持达人';
            else if (streak >= 7) level = 'Lv.2 健康爱好者';
            document.getElementById('display-level').textContent = level;
            
            // 统计数据
            document.getElementById('stat-streak').textContent = streak;
            let total = 0;
            records.forEach(r => {
                (state.tasks || []).forEach(t => { if (r[t.id]) total++; });
            });
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-badges').textContent = (state.achievements || []).length;
        }

        // 头像选择
        document.querySelectorAll('.avatar-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedAvatar = this.dataset.avatar;
                document.getElementById('current-avatar').textContent = selectedAvatar;
            });
        });

        document.getElementById('save-profile').addEventListener('click', saveProfile);

        // 上传头像
        document.getElementById('upload-trigger').addEventListener('click', () => {
            document.getElementById('avatar-upload').click();
        });

        document.getElementById('avatar-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }
            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过2MB');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedAvatar = event.target.result;
                const avatarEl = document.getElementById('current-avatar');
                avatarEl.innerHTML = '<img src="' + selectedAvatar + '" class="avatar-img" alt="头像">';
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
            };
            reader.readAsDataURL(file);
        });

        // 初始化
        updateDisplay();
        const state = loadState();
        if (state.profile) {
            selectedAvatar = state.profile.avatar || '🧘';
            if (state.profile.avatarType === 'image') {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
            } else {
                document.querySelectorAll('.avatar-option').forEach(o => {
                    o.classList.toggle('selected', o.dataset.avatar === selectedAvatar);
                });
            }
        }
    </script>
</body>
</html>
